name: Moomoo ASX Screener Update

on:
  push:
    paths:
      - 'data/*.csv'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Moomoo screener
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: python moomoo_screener.py

      - name: Commit dashboard
        run: |
          git config user.name "Moomoo Screener Bot"
          git config user.email "bot@screener.com"
          git add index.html data/latest.json || true
          git diff --staged --quiet || git commit -m "Moomoo update: $(date '+%d %b %Y %H:%M')"
          git push || true
